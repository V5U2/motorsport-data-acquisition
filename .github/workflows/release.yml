name: release-firmware

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO Core
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp .pio/build/esp32s3-devkitc-1/firmware.bin dist/motorsport-data-acquisition-firmware.bin
          cp .pio/build/esp32s3-devkitc-1/bootloader.bin dist/motorsport-data-acquisition-bootloader.bin
          cp .pio/build/esp32s3-devkitc-1/partitions.bin dist/motorsport-data-acquisition-partitions.bin
          cp .pio/build/esp32s3-devkitc-1/firmware.elf dist/motorsport-data-acquisition-firmware.elf

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/motorsport-data-acquisition-firmware.bin
            dist/motorsport-data-acquisition-bootloader.bin
            dist/motorsport-data-acquisition-partitions.bin
            dist/motorsport-data-acquisition-firmware.elf
